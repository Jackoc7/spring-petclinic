name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  BUILD_NAME: ${{ github.repository }}
  BUILD_NUMBER: ${{ github.run_number }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: https://${{ secrets.JFROG_URL }}
          JF_USER: ${{ secrets.JFROG_USERNAME }}
          JF_PASSWORD: ${{ secrets.JFROG_API_KEY }}

      - name: Configure Maven for Artifactory
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <settings>
            <servers>
              <server>
                <id>jfrog</id>
                <username>${{ secrets.JFROG_USERNAME }}</username>
                <password>${{ secrets.JFROG_API_KEY }}</password>
              </server>
            </servers>
            <mirrors>
              <mirror>
                <id>jfrog</id>
                <url>${{ secrets.JFROG_MAVEN_URL }}</url>
                <mirrorOf>*</mirrorOf>
              </mirror>
            </mirrors>
          </settings>
          EOF

      - name: Maven Build
        run: jf mvn -B clean package -DskipTests

      - name: Collect Build Info
        run: |
          jf rt build-collect-env $BUILD_NAME $BUILD_NUMBER
          jf rt build-add-git $BUILD_NAME $BUILD_NUMBER

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Login (Artifactory)
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.JFROG_URL }}
          username: ${{ secrets.JFROG_USERNAME }}
          password: ${{ secrets.JFROG_API_KEY }}

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.JFROG_URL }}/docker-local/spring-petclinic:${{ github.sha }}
            ${{ secrets.JFROG_URL }}/docker-local/spring-petclinic:latest

      - name: Publish Build Info
        run: jf rt build-publish $BUILD_NAME $BUILD_NUMBER

      - name: Xray Scan
        run: jf bs $BUILD_NAME $BUILD_NUMBER --fail