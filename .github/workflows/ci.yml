name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: https://${{ secrets.JFROG_URL }}
          JF_USER: ${{ secrets.JFROG_USERNAME }}
          JF_PASSWORD: ${{ secrets.JFROG_API_KEY }}

      - name: Configure Maven to use JFrog Artifactory
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << EOF
          <settings>
            <servers>
              <server>
                <id>jfrog</id>
                <username>${{ secrets.JFROG_USERNAME }}</username>
                <password>${{ secrets.JFROG_API_KEY }}</password>
              </server>
            </servers>
            <mirrors>
              <mirror>
                <id>jfrog</id>
                <name>JFrog Artifactory</name>
                <url>${{ secrets.JFROG_MAVEN_URL }}</url>
                <mirrorOf>*</mirrorOf>
              </mirror>
            </mirrors>
          </settings>
          EOF

      - name: Compile
        run: ./mvnw compile

      - name: Test
        run: ./mvnw test

      - name: Build JAR
        run: ./mvnw package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to JFrog Docker registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.JFROG_URL }}
          username: ${{ secrets.JFROG_USERNAME }}
          password: ${{ secrets.JFROG_API_KEY }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.JFROG_URL }}/docker-local/spring-petclinic:${{ github.sha }}
            ${{ secrets.JFROG_URL }}/docker-local/spring-petclinic:latest

      - name: Publish build info
        run: |
          jf rt build-collect-env
          jf rt build-add-git
          jf rt build-publish

      - name: Xray quality gate scan
        run: jf build-scan --fail